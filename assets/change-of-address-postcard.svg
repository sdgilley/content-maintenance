<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">Change of Address Postcard</title>
  <desc id="desc">A postcard announcing a repository move to a new address.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8e7"/>
      <stop offset="100%" stop-color="#ffe8cc"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="860" height="460" rx="24" fill="url(#bg)" stroke="#d9b38c" stroke-width="8"/>

  <rect x="60" y="70" width="360" height="220" rx="16" fill="#ffffff" stroke="#d9d9d9" stroke-width="4"/>
  <path d="M70 90 L240 200 L410 90" fill="none" stroke="#b3b3b3" stroke-width="4"/>
  <path d="M70 280 L180 170" fill="none" stroke="#d0d0d0" stroke-width="4"/>
  <path d="M410 280 L300 170" fill="none" stroke="#d0d0d0" stroke-width="4"/>

  <line x1="500" y1="120" x2="820" y2="120" stroke="#d1a077" stroke-width="6"/>
  <line x1="500" y1="170" x2="820" y2="170" stroke="#d1a077" stroke-width="6"/>
  <line x1="500" y1="220" x2="820" y2="220" stroke="#d1a077" stroke-width="6"/>

  <rect x="690" y="300" width="150" height="120" rx="10" fill="#ffcf99" stroke="#d9a066" stroke-width="4"/>
  <path d="M700 315 C740 350, 790 335, 830 395" fill="none" stroke="#c37c3c" stroke-width="5"/>

  <text x="80" y="355" font-family="Segoe UI, Arial, sans-serif" font-size="48" fill="#6b3f1d" font-weight="700">WE MOVED</text>
  <text x="80" y="410" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#7a4c27">Forwarding Address:</text>
  <text x="80" y="448" font-family="Consolas, 'Courier New', monospace" font-size="27" fill="#3a2a1a">github.com/azure-core/code-ref-monitor</text>
</svg>
